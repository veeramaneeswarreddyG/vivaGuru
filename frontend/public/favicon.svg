<svg 
  xmlns="http://www.w3.org/2000/svg" 
  viewBox="0 0 100 100" 
  fill="none"
>
  <style>
    :root {
      --logo-stop-1: #2A1B3D; /* Deep Plum */
      --logo-stop-2: #00A88F; /* Neo-Mint */
      --logo-stop-3: #40E0D0; /* Bright Mint */
      --logo-spark-fill: #00A88F; /* Neo-Mint */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --logo-stop-1: #2A1B3D; /* Deep Plum */
        --logo-stop-2: #40E0D0; /* Bright Mint */
        --logo-stop-3: #00A88F; /* Neo-Mint */
        --logo-spark-fill: #40E0D0; /* Bright Mint glow */
      }
    }
  </style>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="var(--logo-stop-1)" />
      <stop offset="50%" stopColor="var(--logo-stop-2)" />
      <stop offset="100%" stopColor="var(--logo-stop-3)" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  {/* Outer Circular Ring */}
  <circle 
    cx="50" 
    cy="50" 
    r="38" 
    stroke="url(#logoGrad)" 
    strokeWidth="8.5" 
  />

  {/* Serif-Style Inner V-path matching the brand image */}
  <g stroke="url(#logoGrad)" strokeWidth="8.5" strokeLinecap="round" strokeLinejoin="round">
    {/* Main V body */}
    <path d="M 32,32 L 50,70 L 68,32" />
    {/* Left serif cap */}
    <path d="M 25,32 L 39,32" />
    {/* Right serif cap */}
    <path d="M 61,32 L 75,32" />
  </g>

  {/* Central wisdom spark (Gemini-style four-pointed star) */}
  <path 
    d="M 50,17 Q 50,25 58,25 Q 50,25 50,33 Q 50,25 42,25 Q 50,25 50,17 Z" 
    fill="var(--logo-spark-fill)" 
    filter="url(#logoGlow)"
  />
</svg>